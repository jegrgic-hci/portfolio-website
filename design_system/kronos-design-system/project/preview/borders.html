<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="col" style="gap: 10px;">
    <div class="row" style="gap: 14px;">
      <div style="width: 110px; height: 28px; border: 1px solid #1A1A1A; background: #FFF;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2);">Heavy <span style="color: var(--k-fg-1); font-weight: 700;">#1A1A1A</span> — section rules, focus, active</div>
    </div>
    <div class="row" style="gap: 14px;">
      <div style="width: 110px; height: 28px; border: 1px solid #C8C8C8; background: #FFF;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2);">Mid <span style="color: var(--k-fg-1); font-weight: 700;">#C8C8C8</span> — inputs at rest</div>
    </div>
    <div class="row" style="gap: 14px;">
      <div style="width: 110px; height: 28px; border: 1px solid #E8E8E8; background: #FFF;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2);">Light <span style="color: var(--k-fg-1); font-weight: 700;">#E8E8E8</span> — cards, hairlines</div>
    </div>
    <div class="row" style="gap: 14px;">
      <div style="width: 110px; height: 28px; border-top: 4px solid #1A1A1A; background: transparent;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2);">Rule 4px — major sections</div>
    </div>
  </div>
</div>
</body></html>
