<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">

      <span class="type-caption" style="font-size: 0.55rem;">ARROW</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">

    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="none"><path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="type-caption" style="font-size: 0.55rem;">CLOSE</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

</body></html>
