<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
.cb { width: 18px; height: 18px; border: 1px solid var(--k-fg-1); background: white; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cb.on { background: var(--k-fg-1); }
.row-cb { display: flex; align-items: center; gap: 12px; font-family: var(--font-ui); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--k-fg-1); }
</style>
<div class="card">
  <div class="tiny-cap" style="margin-bottom: 14px;">Checkbox</div>
  <div class="col" style="gap: 12px;">
    <label class="row-cb"><span class="cb on"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4 7L8 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Acknowledge Protocol</label>
    <label class="row-cb"><span class="cb"></span>Unchecked State</label>
    <label class="row-cb" style="opacity: 0.4;"><span class="cb"></span>Disabled</label>
  </div>
</div>
</body></html>
