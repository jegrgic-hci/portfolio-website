<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap: 12px; align-items: stretch;">
    <div style="flex: 1;">
      <div style="height: 92px; background: #7A9393;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Teal — Accent<br><strong style="color: var(--k-fg-1);">#7A9393</strong></div>
    </div>
    <div style="flex: 1;">
      <div style="height: 92px; background: #4A6363;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Teal Dark — Hover<br><strong style="color: var(--k-fg-1);">#4A6363</strong></div>
    </div>
    <div style="flex: 1.4; background: #1A1A1A; padding: 14px 16px; display: flex; align-items: center;">
      <div style="border-left: 4px solid #7A9393; padding-left: 12px; color: white; font-family: var(--font-ui); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; line-height: 1.5;">Accent on dark<br><span style="color: rgba(255,255,255,0.45); font-size: 0.55rem;">Single brand accent.<br>Never as primary fill.</span></div>
    </div>
  </div>
</div>
</body></html>
