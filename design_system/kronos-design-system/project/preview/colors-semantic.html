<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap: 12px;">
    <div style="flex: 1;">
      <div style="height: 72px; background: #BD3E31;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Error<br><strong style="color: #BD3E31;">#BD3E31</strong></div>
    </div>
    <div style="flex: 1;">
      <div style="height: 72px; background: #2D6A4F;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Success<br><strong style="color: #2D6A4F;">#2D6A4F</strong></div>
    </div>
    <div style="flex: 1.6;">
      <div class="tiny-cap" style="margin-bottom: 6px;">Usage</div>
      <div style="font-family: var(--font-body); font-size: 0.78rem; color: var(--k-fg-2); line-height: 1.5;">Semantic only — never decorative. Red for invalid / deprecated, green for confirmed / success.</div>
    </div>
  </div>
</div>
</body></html>
