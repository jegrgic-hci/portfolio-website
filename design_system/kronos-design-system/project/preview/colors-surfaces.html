<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap: 12px;">
    <div style="flex: 1;">
      <div style="height: 72px; background: #F7F7F7; border: 1px solid var(--k-border-light);"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Background<br><strong style="color: var(--k-fg-1);">#F7F7F7</strong></div>
    </div>
    <div style="flex: 1;">
      <div style="height: 72px; background: #FFFFFF; border: 1px solid var(--k-border-light);"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Surface<br><strong style="color: var(--k-fg-1);">#FFFFFF</strong></div>
    </div>
    <div style="flex: 1;">
      <div style="height: 72px; background: #1A1A1A;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Sidebar / Inverse<br><strong style="color: var(--k-fg-1);">#1A1A1A</strong></div>
    </div>
  </div>
</div>
</body></html>
