<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap: 12px;">
    <div style="flex: 1;">
      <div style="height: 72px; background: #1A1A1A;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Text Primary<br><strong style="color: var(--k-fg-1);">#1A1A1A</strong></div>
    </div>
    <div style="flex: 1;">
      <div style="height: 72px; background: #6B6B6B;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Text Secondary<br><strong style="color: var(--k-fg-1);">#6B6B6B</strong></div>
    </div>
    <div style="flex: 1;">
      <div style="height: 72px; background: #A0A0A0;"></div>
      <div style="font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); padding-top: 8px;">Text Muted<br><strong style="color: var(--k-fg-1);">#A0A0A0</strong></div>
    </div>
  </div>
</div>
</body></html>
