<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="tiny-cap" style="margin-bottom: 12px;">Hard edges — no rounding, no shadow</div>
  <div class="row" style="gap: 18px; align-items: center;">
    <div style="width: 110px; height: 80px; background: #fff; border: 1px solid var(--k-border-light);"></div>
    <div style="font-family: var(--font-ui); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); line-height: 1.6;">
      border-radius: 0<br>
      box-shadow: none<br>
      border: 1px solid<br>
      <span style="color: var(--k-fg-3);">Avatars are the only round element (50%).</span>
    </div>
    <div style="width: 56px; height: 56px; border-radius: 50%; background: var(--k-teal); margin-left: auto;"></div>
  </div>
  <div style="margin-top: 14px; padding: 8px 12px; background: var(--k-bg); border-left: 3px solid var(--k-red); font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2);">No drop shadows. No inner glow. Elevation is communicated by border weight.</div>
</div>
</body></html>
