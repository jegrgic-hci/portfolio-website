<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="padding: 0; overflow: hidden;">
  <div style="display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid var(--k-fg-1); padding: 14px 22px;">
    <div style="font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase;">K_LOGO</div>
    <div class="row" style="gap: 24px;">
      <a style="font-family: var(--font-ui); font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--k-fg-1); border-bottom: 2px solid var(--k-fg-1); padding-bottom: 2px; text-decoration: none;">Work</a>
      <a style="font-family: var(--font-ui); font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--k-fg-2); text-decoration: none;">About</a>
      <a style="font-family: var(--font-ui); font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--k-fg-2); text-decoration: none;">Writings</a>
    </div>
    <button style="font-family: var(--font-ui); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 10px 18px; background: var(--k-fg-1); color: white; border: 1px solid var(--k-fg-1); cursor: pointer;">Contact</button>
  </div>
</div>
</body></html>
