<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="tiny-cap" style="margin-bottom: 14px;">Motion — fast, mechanical, no bounces</div>
  <div class="col" style="gap: 10px; font-family: var(--font-ui); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--k-fg-2);">
    <div class="row"><span style="width: 130px; color: var(--k-fg-1); font-weight: 700;">--t-fast</span><span>120ms</span><span style="margin-left: auto; color: var(--k-fg-3);">color, background</span></div>
    <div class="row"><span style="width: 130px; color: var(--k-fg-1); font-weight: 700;">--t-med</span><span>150ms</span><span style="margin-left: auto; color: var(--k-fg-3);">borders, links</span></div>
    <div class="row"><span style="width: 130px; color: var(--k-fg-1); font-weight: 700;">--ease</span><span style="font-size: 0.6rem;">cubic-bezier(.4,0,.2,1)</span></div>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-body); font-size: 0.78rem; color: var(--k-fg-2); line-height: 1.5;">Animate color / background / border-color only. No scale, no translate-on-hover, no spring.</div>
</div>
</body></html>
