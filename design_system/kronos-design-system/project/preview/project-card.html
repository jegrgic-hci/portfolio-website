<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
.tag { font-family: var(--font-ui); font-size: 0.58rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--k-fg-1); background: var(--k-bg); border: 1px solid var(--k-border-mid); padding: 4px 9px; display: inline-block; }
.tag-teal { color: #4A6363; background: rgba(122,147,147,0.08); border-color: #7A9393; }
.k-btn-ghost { font-family: var(--font-ui); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 8px 0; border: none; border-bottom: 1px solid var(--k-fg-1); background: transparent; color: var(--k-fg-1); display: inline-flex; align-items: center; gap: 8px; cursor: pointer; width: fit-content; }
.proj-card { background: #fff; border: 1px solid var(--k-border-light); width: 320px; }
.placeholder { width: 100%; aspect-ratio: 16/9; background: var(--k-bg); border-bottom: 1px solid var(--k-border-light); display: flex; align-items: center; justify-content: center; font-family: var(--font-ui); font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--k-fg-3); }
</style>
<div class="card" style="padding: 18px;">
  <div class="row" style="gap: 18px; align-items: flex-start;">
    <div class="proj-card">
      <div class="placeholder">Image Container</div>
      <div style="padding: 16px; display: flex; flex-direction: column; gap: 10px;">
        <div class="row" style="gap: 6px;"><span class="tag">UX Research</span><span class="tag tag-teal">2024</span></div>
        <div style="font-family: var(--font-ui); font-size: 1rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--k-fg-1);">Project Title</div>
        <div style="font-family: var(--font-body); font-size: 0.82rem; color: var(--k-fg-2); line-height: 1.5;">Brief description of research methodology and outcomes.</div>
        <button class="k-btn-ghost">View Case Study<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>
    <div style="flex: 1; font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-2); line-height: 1.7;">
      <div style="color: var(--k-fg-1); font-weight: 700; margin-bottom: 6px;">Project Card</div>
      Image bleeds to edges<br>
      1px light border<br>
      Hover → border heavy<br>
      No shadow, no radius<br>
      Tags row → H2 → body → ghost CTA
    </div>
  </div>
</div>
</body></html>
