<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<style>
.tag { font-family: var(--font-ui); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--k-fg-1); background: var(--k-bg); border: 1px solid var(--k-border-mid); padding: 5px 10px; display: inline-block; }
.tag-teal { color: #4A6363; background: rgba(122,147,147,0.08); border-color: #7A9393; }
.tag-err { color: var(--k-red); border-color: var(--k-red); background: rgba(189,62,49,0.06); }
</style>
<div class="card">
  <div class="tiny-cap" style="margin-bottom: 14px;">Tags &amp; badges</div>
  <div class="row" style="gap: 10px;">
    <span class="tag">UX Research</span>
    <span class="tag">Product Design</span>
    <span class="tag tag-teal">Featured</span>
    <span class="tag">2024</span>
    <span class="tag tag-err">Deprecated</span>
  </div>
  <div style="margin-top: 14px; font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--k-fg-3);">Mono · 0.6rem · square corners · 4px / 10px padding · 1px border</div>
</div>
</body></html>
